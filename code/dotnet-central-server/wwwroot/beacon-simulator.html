<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BEACON Central API Simulator</title>
  <style>
  :root {
    --font-sans: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
    --font-mono: "IBM Plex Mono", "Consolas", monospace;

    --color-background-primary: #101826;
    --color-background-secondary: #162132;
    --color-background-tertiary: #0a111d;
    --color-background-info: #1b2f45;
    --color-background-success: #123429;
    --color-background-warning: #3b3014;
    --color-background-danger: #401e27;

    --color-border-primary: #33d2cb;
    --color-border-secondary: #2a3d59;
    --color-border-tertiary: #223149;
    --color-border-danger: #8a3a4a;

    --color-text-primary: #ebf3ff;
    --color-text-secondary: #9db2d2;
    --color-text-info: #8fc6ff;
    --color-text-success: #85e4ba;
    --color-text-warning: #ffd68a;
    --color-text-danger: #ff98aa;

    --border-radius-md: 11px;
    --border-radius-lg: 16px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: var(--font-sans);
    color: var(--color-text-primary);
    background:
      radial-gradient(800px circle at 8% -10%, rgba(57, 103, 255, 0.2) 0%, transparent 45%),
      radial-gradient(1000px circle at 110% 0%, rgba(36, 170, 155, 0.2) 0%, transparent 40%),
      linear-gradient(160deg, #0a101c 0%, #0a131f 48%, #0c1524 100%);
    min-height: 100vh;
  }

  .app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 16px 44px;
  }

  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: linear-gradient(125deg, rgba(17, 29, 45, 0.92), rgba(15, 37, 59, 0.82));
    border: 1px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    margin-bottom: 14px;
    box-shadow: 0 18px 30px rgba(0, 0, 0, 0.24);
    backdrop-filter: blur(2px);
  }

  .topbar-logo {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    background: linear-gradient(140deg, #1f88ff, #16b6aa);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 10px 18px rgba(12, 113, 165, 0.34);
  }

  .topbar-logo svg {
    width: 18px;
    height: 18px;
    fill: #fff;
  }

  .topbar-title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
    flex: 1;
  }

  .topbar-subtitle {
    font-size: 12px;
    color: var(--color-text-secondary);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid transparent;
  }

  .badge-info { background: var(--color-background-info); color: var(--color-text-info); border-color: #29486a; }
  .badge-success { background: var(--color-background-success); color: var(--color-text-success); border-color: #1f5a45; }
  .badge-warn { background: var(--color-background-warning); color: var(--color-text-warning); border-color: #6e5721; }
  .badge-danger { background: var(--color-background-danger); color: var(--color-text-danger); border-color: #7d3a49; }
  .badge-neutral { background: var(--color-background-secondary); color: var(--color-text-secondary); border-color: var(--color-border-secondary); }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .full { grid-column: 1 / -1; }

  .card {
    background: linear-gradient(170deg, rgba(15, 24, 38, 0.95), rgba(14, 23, 36, 0.88));
    border: 1px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    overflow: hidden;
    margin-bottom: 12px;
    box-shadow: 0 14px 26px rgba(0, 0, 0, 0.23);
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 1px solid var(--color-border-tertiary);
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--color-text-primary);
    letter-spacing: 0.02em;
  }

  .card-body { padding: 14px; }
  .row-flex { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--color-text-secondary);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  input,
  select {
    width: 100%;
    font: inherit;
    font-size: 13px;
    padding: 8px 10px;
    border-radius: var(--border-radius-md);
    border: 1px solid var(--color-border-secondary);
    background: #131f31;
    color: var(--color-text-primary);
    outline: none;
    transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
  }

  input:focus,
  select:focus {
    border-color: var(--color-border-primary);
    box-shadow: 0 0 0 3px rgba(51, 210, 203, 0.16);
    background: #17263d;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    border-radius: var(--border-radius-md);
    border: 1px solid var(--color-border-secondary);
    background: #15233a;
    color: var(--color-text-primary);
    cursor: pointer;
    transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease, filter 0.12s ease;
    white-space: nowrap;
  }

  .btn:hover { background: #1a2a44; border-color: #355176; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.55; cursor: not-allowed; }

  .btn-primary {
    background: linear-gradient(130deg, #238bff, #19b2a6);
    border-color: #1e92da;
    color: #f8fcff;
  }

  .btn-primary:hover {
    filter: brightness(1.06);
    border-color: #27b8ca;
  }

  .btn-danger {
    background: #341925;
    border-color: #894256;
    color: #ffafbf;
  }

  .btn-danger:hover { filter: brightness(1.05); }
  .btn-sm { padding: 5px 11px; font-size: 12px; }
  .btn-full { width: 100%; justify-content: center; margin-top: 10px; }

  tfoot,
  thead { background: #132136; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }

  th {
    padding: 8px 10px;
    text-align: left;
    color: var(--color-text-secondary);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--color-border-tertiary);
  }

  td {
    padding: 9px 10px;
    border-bottom: 1px solid var(--color-border-tertiary);
    color: var(--color-text-primary);
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #14263e; }

  .empty-row td {
    color: var(--color-text-secondary);
    text-align: center;
    padding: 24px;
  }

  .mono { font-family: var(--font-mono); font-size: 12px; }

  textarea {
    width: 100%;
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 10px;
    border-radius: var(--border-radius-md);
    border: 1px solid var(--color-border-secondary);
    background: #0f192a;
    color: #dce8ff;
    resize: vertical;
    min-height: 180px;
    outline: none;
    line-height: 1.5;
  }

  textarea:focus {
    border-color: var(--color-border-primary);
    box-shadow: 0 0 0 3px rgba(51, 210, 203, 0.16);
  }

  .statusbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: var(--border-radius-md);
    font-size: 13px;
    font-weight: 600;
    border: 1px solid transparent;
  }

  .statusbar.ok { background: var(--color-background-success); color: var(--color-text-success); border-color: #225845; }
  .statusbar.error { background: var(--color-background-danger); color: var(--color-text-danger); border-color: #7a3a4a; }
  .statusbar.idle { background: var(--color-background-secondary); color: var(--color-text-secondary); border-color: var(--color-border-secondary); }

  .conn-row {
    display: grid;
    grid-template-columns: 2fr 2fr 1fr 1fr 1fr;
    gap: 8px;
    align-items: end;
  }

  .section-sep { border: none; border-top: 1px solid var(--color-border-tertiary); margin: 12px 0; }

  .tabs {
    display: flex;
    gap: 3px;
    background: #101b2c;
    border-radius: var(--border-radius-md);
    padding: 4px;
    border: 1px solid var(--color-border-tertiary);
    overflow-x: auto;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--color-text-secondary);
    border: none;
    background: transparent;
    transition: color 0.12s ease, background 0.12s ease;
    white-space: nowrap;
  }

  .tab:hover { color: #d2e3ff; }

  .tab.active {
    background: linear-gradient(130deg, rgba(29, 42, 66, 0.92), rgba(32, 64, 93, 0.92));
    color: #e7f4ff;
    border: 1px solid #2f4f76;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 8px; }
  .form-group { display: flex; flex-direction: column; }

  @media (max-width: 860px) {
    .conn-row { grid-template-columns: 1fr 1fr; }
  }

  @media (max-width: 640px) {
    .grid2 { grid-template-columns: 1fr; }
    .grid4 { grid-template-columns: 1fr 1fr; }
  }
  </style>
</head>
<body>

<div class="app">

  <div class="topbar">
    <div class="topbar-logo">
      <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="3"/><path d="M10 2a8 8 0 1 0 0 16A8 8 0 0 0 10 2zm0 2a6 6 0 1 1 0 12A6 6 0 0 1 10 4z" opacity=".5"/></svg>
    </div>
    <div style="flex:1">
      <div class="topbar-title">BEACON Central API Simulator</div>
      <div class="topbar-subtitle">.NET GraphQL · test operations and inspect responses</div>
    </div>
    <div id="globalStatus" class="badge badge-neutral"><span class="dot"></span> Ready</div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Connection</span>
    </div>
    <div class="card-body">
      <div class="conn-row">
        <div class="form-group">
          <label for="endpoint">GraphQL endpoint</label>
          <input id="endpoint" value="/graphql" />
        </div>
        <div class="form-group">
          <label for="apiKey">API key (X-Api-Key)</label>
          <input id="apiKey" value="dev-admin-key" />
        </div>
        <div class="form-group">
          <label for="apiKeyPreset">Key preset</label>
          <select id="apiKeyPreset">
            <option value="admin">Admin</option>
            <option value="probe">Probe</option>
          </select>
        </div>
        <div class="form-group" style="justify-content:flex-end">
          <button id="applyKeyPreset" class="btn btn-sm" type="button">Apply preset</button>
        </div>
        <div class="form-group" style="justify-content:flex-end">
          <button id="refreshAll" class="btn btn-primary btn-sm" type="button">&#8635; Refresh</button>
        </div>
      </div>
      <div style="margin-top:10px">
        <div id="status" class="statusbar idle"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="flex-shrink:0"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.2"/><path d="M7 4v3.5l2 1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg><span id="statusText">Ready.</span></div>
      </div>
    </div>
  </div>

  <div class="grid2">
    <div class="card" style="margin-bottom:0">
      <div class="card-header">
        <span class="card-title">Fleet</span>
        <span id="fleetCount" class="badge badge-neutral">0 probes</span>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>ID</th><th>Name</th><th>Location</th><th>IP</th><th>Status</th><th>Heartbeat</th></tr></thead>
          <tbody id="fleetRows"><tr class="empty-row"><td colspan="6">No probes loaded.</td></tr></tbody>
        </table>
      </div>
    </div>

    <div class="card" style="margin-bottom:0">
      <div class="card-header">
        <span class="card-title">Plugins</span>
        <span id="pluginCount" class="badge badge-neutral">0 plugins</span>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>ID</th><th>Name</th><th>Version</th><th>Status</th><th></th></tr></thead>
          <tbody id="pluginRows"><tr class="empty-row"><td colspan="5">No plugins loaded.</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <div style="height:12px"></div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Admin actions</span>
      <button id="seedDemo" class="btn btn-danger btn-sm" type="button">Seed demo data</button>
    </div>
    <div class="card-body">
      <div class="tabs" id="adminTabs">
        <button class="tab active" data-tab="register">Register probe</button>
        <button class="tab" data-tab="plugin">Register plugin</button>
        <button class="tab" data-tab="config">Test config</button>
        <button class="tab" data-tab="toggle">Toggle test</button>
        <button class="tab" data-tab="status">Probe status</button>
        <button class="tab" data-tab="query">Query</button>
        <button class="tab" data-tab="bundle">Bundle</button>
      </div>

      <div style="margin-top:14px">

        <div id="tab-register" class="tab-panel active">
          <form id="registerForm">
            <div class="form-grid">
              <div class="form-group"><label>Probe ID</label><input id="probeId" required value="probe-100"/></div>
              <div class="form-group"><label>Name</label><input id="probeName" required value="Lab East"/></div>
              <div class="form-group"><label>Location</label><input id="probeLocation" required value="Building A"/></div>
              <div class="form-group"><label>IP address</label><input id="probeIp" required value="10.1.1.100"/></div>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Register probe</button>
          </form>
        </div>

        <div id="tab-plugin" class="tab-panel">
          <form id="registerPluginForm">
            <div class="form-grid">
              <div class="form-group"><label>Plugin ID</label><input id="pluginId" required value="plugin-http-v2"/></div>
              <div class="form-group"><label>Name</label><input id="pluginName" required value="HTTP Probe"/></div>
              <div class="form-group"><label>Version</label><input id="pluginVersion" required value="2.1.0"/></div>
              <div class="form-group"><label>Description</label><input id="pluginDescription" value="HTTP endpoint reachability checks"/></div>
              <div class="form-group full"><label>Checksum</label><input id="pluginChecksum" required value="bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb" class="mono"/></div>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Register plugin</button>
          </form>
        </div>

        <div id="tab-config" class="tab-panel">
          <form id="configForm">
            <div class="form-grid">
              <div class="form-group"><label>Probe ID</label><input id="cfgProbeId" required value="probe-100"/></div>
              <div class="form-group"><label>Test type</label><input id="cfgType" required value="PING"/></div>
              <div class="form-group"><label>Interval (seconds)</label><input id="cfgInterval" type="number" min="5" max="3600" required value="30"/></div>
              <div class="form-group"><label>Enabled</label>
                <select id="cfgEnabled"><option value="true">true</option><option value="false">false</option></select>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Update config</button>
          </form>
        </div>

        <div id="tab-toggle" class="tab-panel">
          <form id="testToggleForm">
            <div class="form-grid">
              <div class="form-group"><label>Probe ID</label><input id="toggleProbeId" required value="probe-100"/></div>
              <div class="form-group"><label>Test type</label><input id="toggleType" required value="PING"/></div>
              <div class="form-group"><label>Enabled</label>
                <select id="toggleEnabled"><option value="true">true</option><option value="false">false</option></select>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Apply toggle</button>
          </form>
        </div>

        <div id="tab-status" class="tab-panel">
          <form id="statusForm">
            <div class="form-grid">
              <div class="form-group"><label>Probe ID</label><input id="statusProbeId" required value="probe-100"/></div>
              <div class="form-group"><label>Status</label>
                <select id="statusValue">
                  <option value="REGISTERED">REGISTERED</option>
                  <option value="ACTIVE">ACTIVE</option>
                  <option value="INACTIVE">INACTIVE</option>
                  <option value="DECOMMISSIONED">DECOMMISSIONED</option>
                </select>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Update status</button>
          </form>
        </div>

        <div id="tab-query" class="tab-panel">
          <div class="grid2">
            <form id="probeConfigForm">
              <div class="card-title" style="margin-bottom:8px;font-size:13px">Get probe config</div>
              <div class="form-group"><label>Probe ID</label><input id="probeConfigProbeId" required value="probe-100"/></div>
              <button type="submit" class="btn btn-primary btn-full">Fetch config</button>
            </form>
            <form id="pluginByIdForm">
              <div class="card-title" style="margin-bottom:8px;font-size:13px">Get plugin by ID</div>
              <div class="form-group"><label>Plugin ID</label><input id="pluginByIdValue" required value="plugin-http-v2"/></div>
              <button type="submit" class="btn btn-primary btn-full">Fetch plugin</button>
            </form>
          </div>
        </div>

        <div id="tab-bundle" class="tab-panel">
          <form id="bundleDownloadForm">
            <div class="form-grid">
              <div class="form-group"><label>Plugin ID</label><input id="bundlePluginId" required value="plugin-http-v2"/></div>
              <div class="form-group"><label>Version</label><input id="bundleVersion" required value="2.1.0"/></div>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Download bundle</button>
          </form>
        </div>

      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Response output</span>
      <button id="clearOutput" class="btn btn-sm" type="button">Clear</button>
    </div>
    <div class="card-body">
      <textarea id="output" readonly>{}</textarea>
    </div>
  </div>

</div>

<script>
const ui={
  endpoint:document.getElementById("endpoint"),
  apiKey:document.getElementById("apiKey"),
  apiKeyPreset:document.getElementById("apiKeyPreset"),
  applyKeyPreset:document.getElementById("applyKeyPreset"),
  status:document.getElementById("status"),
  statusText:document.getElementById("statusText"),
  globalStatus:document.getElementById("globalStatus"),
  output:document.getElementById("output"),
  fleetRows:document.getElementById("fleetRows"),
  pluginRows:document.getElementById("pluginRows"),
  fleetCount:document.getElementById("fleetCount"),
  pluginCount:document.getElementById("pluginCount"),
  refreshAll:document.getElementById("refreshAll"),
  seedDemo:document.getElementById("seedDemo"),
  registerForm:document.getElementById("registerForm"),
  registerPluginForm:document.getElementById("registerPluginForm"),
  configForm:document.getElementById("configForm"),
  testToggleForm:document.getElementById("testToggleForm"),
  statusForm:document.getElementById("statusForm"),
  probeConfigForm:document.getElementById("probeConfigForm"),
  pluginByIdForm:document.getElementById("pluginByIdForm"),
  bundleDownloadForm:document.getElementById("bundleDownloadForm"),
  clearOutput:document.getElementById("clearOutput")
};

const DEMO_PLUGINS=[
  {id:"plugin-rssi-v1",name:"RSSI Monitor",version:"1.0.0",checksum:"aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa",description:"Signal strength monitor"},
  {id:"plugin-http-v2",name:"HTTP Probe",version:"2.1.0",checksum:"bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb",description:"HTTP endpoint reachability checks"}
];
const DEMO_PROBES=[
  {id:"probe-001",name:"Main Floor",location:"Room 101",ipAddress:"192.168.1.100",status:"ACTIVE",tests:[{testType:"PING",intervalSeconds:30,enabled:true},{testType:"HTTP",intervalSeconds:60,enabled:true}]},
  {id:"probe-002",name:"Lobby Probe",location:"Entrance",ipAddress:"192.168.1.101",status:"ACTIVE",tests:[{testType:"RSSI",intervalSeconds:20,enabled:true},{testType:"PING",intervalSeconds:45,enabled:true}]},
  {id:"probe-003",name:"West Wing",location:"Building A, Room 204",ipAddress:"192.168.1.102",status:"INACTIVE",tests:[{testType:"HTTP",intervalSeconds:120,enabled:true},{testType:"IPERF",intervalSeconds:300,enabled:true}]}
];
const KEY_PRESETS={admin:"dev-admin-key",probe:"dev-probe-key"};

function statusBadgeClass(s){
  if(s==="ACTIVE")return"badge-success";
  if(s==="INACTIVE"||s==="DECOMMISSIONED")return"badge-warn";
  return"badge-info";
}

function setStatus(msg,isError){
  ui.statusText.textContent=msg;
  ui.status.className="statusbar "+(isError?"error":"ok");
  ui.globalStatus.className="badge "+(isError?"badge-danger":"badge-success");
  ui.globalStatus.innerHTML='<span class="dot"></span> '+(isError?"Error":"OK");
}
function setOutput(data){ui.output.value=JSON.stringify(data,null,2);}
function td(v){return`<td>${v??""}</td>`;}
function authHeaders(h){const x={...(h||{})};const k=ui.apiKey.value.trim();if(k)x["X-Api-Key"]=k;return x;}

function applyApiKeyPreset(){
  const v=KEY_PRESETS[ui.apiKeyPreset.value];
  if(v){ui.apiKey.value=v;setStatus(`Applied ${ui.apiKeyPreset.value} key preset.`,false);}
}

async function gql(query,variables){
  const endpoint=ui.endpoint.value.trim()||"/graphql";
  const res=await fetch(endpoint,{method:"POST",headers:authHeaders({"Content-Type":"application/json"}),body:JSON.stringify({query,variables:variables||{}})});
  const payload=await res.json();
  if(!res.ok||payload.errors)throw new Error(JSON.stringify(payload.errors||payload,null,2));
  return payload.data;
}

function isDupe(e){const v=(e||"").toLowerCase();return v.includes("already")||v.includes("exists")||v.includes("duplicate");}

function renderFleet(probes){
  ui.fleetRows.innerHTML="";
  ui.fleetCount.textContent=(probes?.length||0)+" probe"+(probes?.length===1?"":"s");
  if(!probes||!probes.length){ui.fleetRows.innerHTML='<tr class="empty-row"><td colspan="6">No probes found.</td></tr>';return;}
  for(const p of probes){
    const sc=statusBadgeClass(p.status);
    ui.fleetRows.insertAdjacentHTML("beforeend",`<tr>
      ${td(`<span class="mono">${p.id}</span>`)}
      ${td(p.name)}
      ${td(p.location)}
      ${td(`<span class="mono">${p.ipAddress}</span>`)}
      <td><span class="badge ${sc}">${p.status}</span></td>
      ${td(p.lastHeartbeat||"—")}
    </tr>`);
  }
}

function renderPlugins(plugins){
  ui.pluginRows.innerHTML="";
  ui.pluginCount.textContent=(plugins?.length||0)+" plugin"+(plugins?.length===1?"":"s");
  if(!plugins||!plugins.length){ui.pluginRows.innerHTML='<tr class="empty-row"><td colspan="5">No plugins found.</td></tr>';return;}
  for(const p of plugins){
    const avail=p.available;
    ui.pluginRows.insertAdjacentHTML("beforeend",`<tr>
      ${td(`<span class="mono">${p.id}</span>`)}
      ${td(p.name)}
      ${td(p.version)}
      <td><span class="badge ${avail?"badge-success":"badge-neutral"}">${avail?"available":"disabled"}</span></td>
      <td><button type="button" class="btn btn-sm ${avail?"btn-danger":""}" data-plugin-id="${p.id}" data-next-available="${!avail}">${avail?"Disable":"Enable"}</button></td>
    </tr>`);
  }
}

async function refreshAll(){
  setStatus("Loading...",false);
  ui.refreshAll.disabled=true;
  try{
    const [fd,pd]=await Promise.all([
      gql(`query{fleetStatus{probes{id name location ipAddress status lastHeartbeat}}}`),
      gql(`query{plugins{id name version checksum description releasedAt available}}`)
    ]);
    renderFleet(fd.fleetStatus.probes);
    renderPlugins(pd.plugins);
    setOutput({fleet:fd,plugins:pd});
    setStatus("Fleet and plugins loaded.",false);
  }catch(e){
    setStatus("Failed to refresh data.",true);
    setOutput({error:String(e)});
  }finally{ui.refreshAll.disabled=false;}
}

async function seedDemoData(){
  const rplug=`mutation RegisterPlugin($input:RegisterPluginInputTypeInput!){registerPlugin(input:$input){success message plugin{id name version}}}`;
  const rprobe=`mutation RegisterProbe($input:RegisterProbeInputTypeInput!){registerProbe(input:$input){success message probe{id}}}`;
  const ucfg=`mutation UpdateProbeTestConfig($input:UpdateProbeTestConfigInputTypeInput!){updateProbeTestConfig(input:$input){success message config{probeId testType intervalSeconds enabled}}}`;
  const ust=`mutation UpdateProbeStatus($probeId:String!,$status:String!){updateProbeStatus(probeId:$probeId,status:$status){success message probe{id status}}}`;
  const sum={registeredPlugins:0,registeredProbes:0,configuredTests:0,statusUpdates:0,skipped:[],errors:[]};
  setStatus("Seeding demo data…",false);
  for(const pl of DEMO_PLUGINS){
    try{const d=await gql(rplug,{input:pl});if(d.registerPlugin?.success)sum.registeredPlugins++;else sum.skipped.push(`plugin ${pl.id}`);}
    catch(e){const m=String(e);if(isDupe(m))sum.skipped.push(`plugin ${pl.id}: already exists`);else sum.errors.push(`plugin ${pl.id}: ${m}`);}
  }
  for(const p of DEMO_PROBES){
    try{const r=await gql(rprobe,{input:{id:p.id,name:p.name,location:p.location,ipAddress:p.ipAddress}});if(r.registerProbe?.success)sum.registeredProbes++;else sum.skipped.push(`probe ${p.id}`);}
    catch(e){const m=String(e);if(isDupe(m))sum.skipped.push(`probe ${p.id}: already exists`);else sum.errors.push(`probe ${p.id}: ${m}`);}
    for(const t of p.tests){
      try{const c=await gql(ucfg,{input:{probeId:p.id,testType:t.testType,intervalSeconds:t.intervalSeconds,enabled:t.enabled}});if(c.updateProbeTestConfig?.success)sum.configuredTests++;}
      catch(e){sum.errors.push(`config ${p.id}/${t.testType}: ${String(e)}`);}
    }
    try{const s=await gql(ust,{probeId:p.id,status:p.status});if(s.updateProbeStatus?.success)sum.statusUpdates++;}
    catch(e){sum.errors.push(`status ${p.id}: ${String(e)}`);}
  }
  await refreshAll();
  setOutput(sum);
  setStatus(sum.errors.length?"Seed completed with errors.":"Seed completed.",sum.errors.length>0);
}

document.getElementById("adminTabs").addEventListener("click",e=>{
  const btn=e.target.closest(".tab");

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("tab-"+btn.dataset.tab).classList.add("active");
});

ui.bundleDownloadForm.addEventListener("submit",async e=>{
  e.preventDefault();
  const pluginId=document.getElementById("bundlePluginId").value.trim();
  const version=document.getElementById("bundleVersion").value.trim();
  const url=`/plugins/${encodeURIComponent(pluginId)}/${encodeURIComponent(version)}/bundle`;
  try{
    const res=await fetch(url,{method:"GET",headers:authHeaders()});
    if(!res.ok)throw new Error((await res.text())||`HTTP ${res.status}`);
    const blob=await res.blob();
    const dl=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=dl;a.download=`${pluginId}-${version}.zip`;
    document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(dl);
    setOutput({downloadUrl:url,pluginId,version,status:"downloaded"});
    setStatus("Bundle downloaded.",false);
  }catch(e){setStatus("Bundle download failed.",true);setOutput({error:String(e),downloadUrl:url});}
});
